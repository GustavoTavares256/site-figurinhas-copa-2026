<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Meus pedidos</title>

  <link rel="stylesheet" href="orders.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />
</head>

<body>
  <main class="orders-page">
    <section class="orders-card">
      <span class="orders-tag">Acompanhamento</span>

      <h1>Meus pedidos</h1>

      <p>
        Digite o mesmo telefone usado na compra para acompanhar seus pedidos.
      </p>

      <form id="searchOrdersForm" class="orders-form">
        <input
          type="text"
          id="phoneInput"
          placeholder="Digite seu telefone / WhatsApp"
          required
        />

        <button type="submit">
          Buscar pedidos
        </button>
      </form>

      <div id="customerOrdersList" class="orders-list"></div>

      <a href="index.html" class="back-link">
        Voltar para loja
      </a>
    </section>
  </main>

  <script src="orders.js"></script>
</body>
</html>
