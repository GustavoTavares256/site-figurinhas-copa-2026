<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pedido confirmado</title>

  <link rel="stylesheet" href="css/success.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />
</head>

<body>
  <main class="success-page">
    <section class="success-card">
      <div class="success-badge">
        <span>✓</span>
      </div>

      <span class="success-tag">
        Pedido confirmado
      </span>

      <h1>
        Compra registrada com sucesso!
      </h1>

      <p>
        Recebemos seu pedido e ele já está salvo no sistema. Em breve entraremos
        em contato pelo WhatsApp ou e-mail para combinar pagamento e entrega.
      </p>

      <div class="success-info">
        <div>
          <strong>Status</strong>
          <span>Pedido recebido</span>
        </div>

        <div>
          <strong>Próximo passo</strong>
          <span>Aguardar contato</span>
        </div>
      </div>

      <div class="success-actions">
        <a href="orders.html" class="primary-link">
          Acompanhar pedido
        </a>

        <a href="index.html" class="secondary-link">
          Voltar para loja
        </a>
      </div>
    </section>
  </main>
</body>
</html>
