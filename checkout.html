<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Checkout - Copa Stickers</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="checkout-page">
    <section class="checkout-container">
      <div class="checkout-form-box">
        <h1>Finalizar compra</h1>
        <p>Preencha seus dados para continuar.</p>

        <form id="checkoutForm" class="checkout-form">
          <input type="text" id="customerName" placeholder="Nome completo" required />
          <input type="email" id="customerEmail" placeholder="E-mail" />
          <input type="text" id="customerPhone" placeholder="Telefone / WhatsApp" required />
          <input type="text" id="customerAddress" placeholder="Endereço completo" required />

          <button type="submit">
            Confirmar pedido
          </button>
        </form>
      </div>

      <aside class="checkout-summary">
        <h2>Resumo do pedido</h2>

        <div id="checkoutItems"></div>

        <strong>
          Total: R$ <span id="checkoutTotal">0,00</span>
        </strong>
      </aside>
    </section>
  </main>

  <script src="checkout.js"></script>
</body>
</html>
