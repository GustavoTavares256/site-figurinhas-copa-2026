<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Login Admin
  </title>

  <link
    rel="stylesheet"
    href="admin.css"
  />

</head>

<body>

  <main class="login-container">

    <section class="login-card">

      <h1>
        Login Admin
      </h1>

      <p>
        Acesse o painel administrativo.
      </p>

      <form
        id="loginForm"
        class="login-form"
      >

        <input
          type="email"
          id="email"
          placeholder="E-mail"
          required
        />

        <input
          type="password"
          id="password"
          placeholder="Senha"
          required
        />

        <button type="submit">
          Entrar
        </button>

      </form>

    </section>

  </main>

  <script src="login.js"></script>

</body>
</html>
