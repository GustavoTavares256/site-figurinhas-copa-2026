<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin - Copa Stickers</title>

  <link rel="stylesheet" href="admin.css" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <aside class="sidebar">
    <div class="sidebar-logo">⚽ Copa Admin</div>

    <nav>
      <a href="#dashboard">Dashboard</a>
      <a href="#products">Produtos</a>
      <a href="#analytics">Analytics</a>
      <a href="#orders">Pedidos</a>
    </nav>

    <button class="logout-btn" id="logoutBtn">Sair</button>
  </aside>

  <main class="admin-container">
    <header class="admin-header">
      <div>
        <h1>Painel Admin</h1>
        <p>Gerencie produtos, pedidos, estoque e métricas.</p>
      </div>
    </header>

    <section class="dashboard" id="dashboard">
      <article class="dashboard-card">
        <h3>Produtos</h3>
        <span id="productsCount">0</span>
      </article>

      <article class="dashboard-card">
        <h3>Pedidos</h3>
        <span id="ordersCount">0</span>
      </article>

      <article class="dashboard-card">
        <h3>Receita</h3>
        <span id="revenueValue">R$ 0,00</span>
      </article>

      <article class="dashboard-card">
        <h3>Estoque baixo</h3>
        <span id="lowStockCount">0</span>
      </article>
    </section>

    <section class="form-section" id="products">
      <h2 id="formTitle">Cadastrar produto</h2>

      <form id="productForm" class="product-form">
        <input type="hidden" id="productId" />

        <input type="text" id="name" placeholder="Nome" required />
        <input type="number" id="price" placeholder="Preço" step="0.01" required />
        <input type="number" id="stock" placeholder="Estoque" required />
        <input type="text" id="category" placeholder="Categoria" required />
        <input type="text" id="icon" placeholder="Emoji/ícone" />
        <textarea id="description" placeholder="Descrição"></textarea>

        <input type="file" id="image" accept="image/*" />

        <img id="previewImage" class="preview-image" src="" alt="Preview da imagem" />

        <button type="submit" id="submitButton">Salvar produto</button>
      </form>
    </section>

    <section class="products-section">
      <div class="section-row">
        <h2>Produtos cadastrados</h2>

        <input
          type="text"
          id="searchProducts"
          class="search-input"
          placeholder="Buscar produto..."
        />
      </div>

      <div id="productsGrid" class="products-grid"></div>
    </section>

    <section class="analytics-section" id="analytics">
      <h2>Analytics</h2>

      <div class="chart-card">
        <canvas id="salesChart"></canvas>
      </div>
    </section>

    <section class="orders-section" id="orders">
      <div class="section-row">
        <h2>Pedidos recebidos</h2>

        <select id="statusFilter" class="status-select">
          <option value="all">Todos</option>
          <option value="pending">Recebido</option>
          <option value="paid">Pago</option>
          <option value="shipped">Enviado</option>
          <option value="delivered">Entregue</option>
          <option value="cancelled">Cancelado</option>
        </select>
      </div>

      <div id="ordersList" class="orders-list"></div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
